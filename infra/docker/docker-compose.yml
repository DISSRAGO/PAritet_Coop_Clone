services:
  postgres:
    image: postgres:16
    volumes:
      - ./data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: homonet_clone
    networks:
      - shared

  redis:
    image: redis:alpine
    networks:
      - shared

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./cogi_Clone/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - shared

networks:
  shared:
    name: clone_shared